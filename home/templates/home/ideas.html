<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ideas</title>
    <style>
            table, th, td {
            border: 1px solid black;
            }
    </style>
</head>
<body>
    <div class="container mt-5">
        <form class="col-6 mx-auto card p-3 shadow-lg" method="post">
            {% csrf_token %}
            <h2>Submit Your Idea</h2>
            <hr>
            <div class="mb-3">
                <label class="form-label">Idea Title</label>
                <input name="idea_title" required type="text" class="form-control">
            </div>
            <div class="mb-3">
                <label class="form-label">Idea Description</label>
                <textarea name="idea_description" required class="form-control"></textarea>
            </div>
            <button type="submit" class="btn btn-success">Submit Idea</button>
        </form>
    </div>
</body>
</html>
